<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏘️ 우리 마을 경제 매니저: 개인 로그라이크 v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <style>
/* ───────────────────────────────────────────────
   우리 마을 경제 매니저 — 게임 UI 디자인 토큰
   동물의 숲 × 타이쿤 게임 룩
─────────────────────────────────────────────── */
:root {
  /* Brand cream/sky palette */
  --cream-50: #FFFBEE;
  --cream-100: #FFF3D6;
  --cream-200: #FFE6A8;
  --cream-300: #FFD371;
  --sky-100: #DFF5F1;
  --sky-200: #B6E8DC;
  --sky-300: #7DD0BD;

  /* Game wood / accents */
  --wood-light: #F2C98A;
  --wood: #C68A4F;
  --wood-deep: #8E5A2E;
  --leaf: #7DB342;
  --leaf-deep: #4F8A2E;
  --berry: #E8645A;
  --berry-deep: #B83C30;
  --sunny: #FFC83D;
  --sunny-deep: #E0A21A;
  --grape: #B388E0;
  --ocean: #4FB3E8;
  --ocean-deep: #2A7AAE;

  /* Neutrals */
  --ink: #5A3A22;
  --ink-soft: #8A6B4F;
  --paper: #FFF8E7;

  /* Pastel pairs (trade) */
  --in-bg: #DCEEFB;
  --in-border: #8FC4ED;
  --in-ink: #1F5C8E;
  --out-bg: #FBE0DC;
  --out-border: #ED9C92;
  --out-ink: #A6362A;

  /* Neon for teacher TV */
  --tv-bg-1: #0E1B3D;
  --tv-bg-2: #1A2B5E;
  --neon-yellow: #FFE45E;
  --neon-cyan: #5CE5E5;
  --neon-pink: #FF6FD8;
  --neon-green: #6CFFB1;
  --neon-orange: #FFA94D;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Jua', 'Do Hyeon', 'Noto Sans KR', sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  background: var(--cream-50);
}

button { font-family: inherit; }
input { font-family: inherit; }

/* ─── Cloud / sky background ───────────────── */
.sky-bg {
  background:
    radial-gradient(ellipse 90% 60% at 15% 20%, rgba(255,255,255,0.7) 0%, transparent 50%),
    radial-gradient(ellipse 70% 50% at 85% 75%, rgba(255,255,255,0.55) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(125,208,189,0.35) 0%, transparent 60%),
    linear-gradient(160deg, #C9ECF2 0%, #FFF3D6 60%, #FFE6A8 100%);
  position: relative;
  overflow: hidden;
}
.sky-bg::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 12% 15%, white 0 14px, transparent 16px),
    radial-gradient(circle at 22% 12%, white 0 18px, transparent 20px),
    radial-gradient(circle at 30% 18%, white 0 14px, transparent 16px),
    radial-gradient(circle at 78% 72%, white 0 20px, transparent 22px),
    radial-gradient(circle at 88% 78%, white 0 16px, transparent 18px);
  opacity: 0.55;
  pointer-events: none;
}
.sky-bg > * { position: relative; z-index: 1; }

/* ─── Tycoon "wooden plate" card ───────────── */
.plate {
  background: linear-gradient(180deg, #FFFCF1 0%, #FFF3D6 100%);
  border: 3px solid var(--wood-light);
  border-radius: 28px;
  box-shadow:
    inset 0 -6px 0 rgba(198,138,79,0.18),
    inset 0 2px 0 rgba(255,255,255,0.9),
    0 8px 0 var(--wood-light),
    0 14px 30px rgba(142,90,46,0.18);
}
.plate-soft {
  background: #FFFCF1;
  border: 2.5px solid #F2D9A8;
  border-radius: 22px;
  box-shadow: inset 0 -4px 0 rgba(198,138,79,0.10), 0 4px 0 #F2D9A8;
}

/* ─── Big chunky button (game start style) ── */
.btn3d {
  position: relative;
  border: 3px solid var(--wood-deep);
  border-radius: 22px;
  padding: 18px 22px;
  font-family: 'Jua', sans-serif;
  font-size: 22px;
  letter-spacing: 0.5px;
  cursor: pointer;
  background: linear-gradient(180deg, #FFE2A8 0%, #F2C98A 100%);
  color: var(--ink);
  box-shadow:
    inset 0 -6px 0 rgba(142,90,46,0.20),
    inset 0 3px 0 rgba(255,255,255,0.6),
    0 6px 0 var(--wood-deep),
    0 10px 18px rgba(142,90,46,0.22);
  transition: transform 80ms ease, box-shadow 80ms ease;
}
.btn3d:hover { transform: translateY(-2px); }
.btn3d:active { transform: translateY(4px); box-shadow: inset 0 -2px 0 rgba(142,90,46,0.20), 0 2px 0 var(--wood-deep); }
.btn3d.green { background: linear-gradient(180deg, #B7E191 0%, #7DB342 100%); border-color: var(--leaf-deep); box-shadow: inset 0 -6px 0 rgba(79,138,46,0.25), inset 0 3px 0 rgba(255,255,255,0.6), 0 6px 0 var(--leaf-deep), 0 10px 18px rgba(79,138,46,0.22); }
.btn3d.red   { background: linear-gradient(180deg, #F4978E 0%, #E8645A 100%); border-color: var(--berry-deep); box-shadow: inset 0 -6px 0 rgba(184,60,48,0.25), inset 0 3px 0 rgba(255,255,255,0.5), 0 6px 0 var(--berry-deep), 0 10px 18px rgba(184,60,48,0.22); color: white; }
.btn3d.blue  { background: linear-gradient(180deg, #8ED5F4 0%, #4FB3E8 100%); border-color: var(--ocean-deep); box-shadow: inset 0 -6px 0 rgba(42,122,174,0.25), inset 0 3px 0 rgba(255,255,255,0.6), 0 6px 0 var(--ocean-deep), 0 10px 18px rgba(42,122,174,0.22); color: white; }
.btn3d.navy  { background: linear-gradient(180deg, #4357A8 0%, #1A237E 100%); border-color: #0E1547; box-shadow: inset 0 -6px 0 rgba(14,21,71,0.40), inset 0 3px 0 rgba(255,255,255,0.25), 0 6px 0 #0E1547, 0 10px 18px rgba(14,21,71,0.30); color: white; }
.btn3d.muted { background: linear-gradient(180deg, #E8D9BB 0%, #C9B68F 100%); border-color: #8E7350; box-shadow: inset 0 -5px 0 rgba(142,115,80,0.22), inset 0 2px 0 rgba(255,255,255,0.5), 0 5px 0 #8E7350, 0 8px 14px rgba(142,115,80,0.18); color: var(--ink); opacity: 0.85; }
.btn3d:disabled { cursor: not-allowed; opacity: 0.55; }

/* small pill button */
.pill {
  background: white;
  border: 2.5px solid var(--wood-light);
  border-radius: 999px;
  padding: 8px 16px;
  font-family: 'Jua', sans-serif;
  font-size: 15px;
  color: var(--ink);
  cursor: pointer;
  box-shadow: 0 3px 0 var(--wood-light);
  transition: transform 80ms ease;
}
.pill:hover { transform: translateY(-1px); }
.pill:active { transform: translateY(2px); box-shadow: none; }

/* counter +/- circle */
.qbtn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 2.5px solid var(--wood-deep);
  font-family: 'Jua', sans-serif;
  font-size: 18px;
  cursor: pointer;
  background: linear-gradient(180deg, #FFFFFF 0%, #FFF3D6 100%);
  color: var(--ink);
  box-shadow: inset 0 -3px 0 rgba(142,90,46,0.18), 0 3px 0 var(--wood-deep);
  display: inline-flex; align-items: center; justify-content: center;
  transition: transform 80ms;
}
.qbtn:hover { transform: translateY(-1px); }
.qbtn:active { transform: translateY(2px); box-shadow: none; }
.qbtn.plus { background: linear-gradient(180deg, #FFD879 0%, #FFB52E 100%); color: white; border-color: var(--sunny-deep); box-shadow: inset 0 -3px 0 rgba(224,162,26,0.35), 0 3px 0 var(--sunny-deep); }
.qbtn.minus { background: linear-gradient(180deg, #FFFFFF 0%, #F2E2C2 100%); }
.qbtn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ─── Sparkle "use resource" cards ─────────── */
@keyframes sparkle-rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes float-y {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 rgba(255,200,61,0.45), inset 0 -4px 0 rgba(0,0,0,0.06), 0 5px 0 var(--card-shadow, #DDB066); }
  50% { box-shadow: 0 0 26px rgba(255,200,61,0.8), inset 0 -4px 0 rgba(0,0,0,0.06), 0 5px 0 var(--card-shadow, #DDB066); }
}
.glint {
  position: relative;
  overflow: hidden;
  isolation: isolate;
}
.glint::after {
  content: '';
  position: absolute;
  top: -50%; left: -60%;
  width: 60%; height: 200%;
  background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.7) 50%, transparent 100%);
  transform: skewX(-20deg);
  animation: glint-sweep 2.8s ease-in-out infinite;
  pointer-events: none;
}
@keyframes glint-sweep {
  0%, 60% { left: -60%; }
  100% { left: 130%; }
}

.use-card {
  border: 3px solid var(--c-border);
  background: linear-gradient(180deg, var(--c-bg-1) 0%, var(--c-bg-2) 100%);
  border-radius: 20px;
  padding: 14px 10px 16px;
  text-align: center;
  cursor: pointer;
  position: relative;
  box-shadow: inset 0 -5px 0 rgba(0,0,0,0.06), inset 0 2px 0 rgba(255,255,255,0.8), 0 5px 0 var(--c-shadow);
  transition: transform 80ms;
  animation: float-y 3s ease-in-out infinite;
}
.use-card:hover { transform: translateY(-3px); }
.use-card:active { transform: translateY(3px); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.06), 0 2px 0 var(--c-shadow); }
.use-card .big-emoji {
  font-size: 38px;
  line-height: 1;
  display: inline-block;
  filter: drop-shadow(0 2px 0 rgba(0,0,0,0.08));
}
.use-card .label {
  font-family: 'Jua', sans-serif;
  font-size: 14px;
  color: var(--c-ink);
  margin-top: 6px;
  font-weight: 400;
}
.use-card .effect {
  display: inline-block;
  margin-top: 8px;
  padding: 3px 10px;
  border-radius: 999px;
  background: white;
  border: 2px solid var(--c-border);
  font-size: 12px;
  color: var(--c-ink);
}
.use-card .star {
  position: absolute;
  font-size: 16px;
  pointer-events: none;
  animation: sparkle-rotate 4s linear infinite;
}

/* ─── Trade panels (in/out) ─────────────────── */
.trade-panel {
  border-radius: 22px;
  padding: 16px 14px;
  border: 3px solid var(--tp-border);
  background: linear-gradient(180deg, var(--tp-bg-1), var(--tp-bg-2));
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.7), inset 0 -3px 0 rgba(0,0,0,0.04);
}
.trade-panel.in  { --tp-bg-1: #ECF6FE; --tp-bg-2: var(--in-bg); --tp-border: var(--in-border); }
.trade-panel.out { --tp-bg-1: #FEF1EE; --tp-bg-2: var(--out-bg); --tp-border: var(--out-border); }
.trade-row {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  align-items: center;
  gap: 8px;
  padding: 6px 4px;
  border-radius: 12px;
}
.trade-row + .trade-row { border-top: 1.5px dashed rgba(0,0,0,0.08); }
.trade-row .ic { font-size: 22px; text-align: center; }
.trade-row .nm { font-size: 14px; font-family: 'Jua'; }
.trade-input {
  width: 70px;
  height: 36px;
  border-radius: 12px;
  border: 2px solid var(--tp-border);
  background: white;
  text-align: center;
  font-family: 'Jua';
  font-size: 16px;
  color: var(--ink);
  outline: none;
}
.trade-input:focus { border-color: var(--ink); }

/* ─── Resource / facility chip ──────────────── */
.chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: white;
  border: 2px solid #F2D9A8;
  border-radius: 14px;
  padding: 8px 10px;
  font-family: 'Jua';
  font-size: 16px;
  box-shadow: inset 0 -3px 0 rgba(198,138,79,0.10);
}
.chip .ic { font-size: 20px; }
.chip .num { margin-left: auto; color: var(--wood-deep); font-size: 18px; }

/* ─── Top bar (HUD) ─────────────────────────── */
.hud {
  background: linear-gradient(180deg, #FFFCF1 0%, #FFF3D6 100%);
  border-bottom: 3px solid var(--wood-light);
  box-shadow: 0 4px 0 var(--wood-light), 0 8px 20px rgba(142,90,46,0.10);
  position: sticky; top: 0; z-index: 30;
}
.coin-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(180deg, #FFF1B4 0%, #FFD371 100%);
  border: 2.5px solid var(--sunny-deep);
  border-radius: 999px;
  padding: 6px 14px;
  font-family: 'Jua';
  font-size: 18px;
  color: var(--wood-deep);
  box-shadow: inset 0 -3px 0 rgba(224,162,26,0.30), 0 3px 0 var(--sunny-deep);
}
.heart-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(180deg, #C8EFC0 0%, #8FD082 100%);
  border: 2.5px solid var(--leaf-deep);
  border-radius: 999px;
  padding: 6px 14px;
  font-family: 'Jua';
  font-size: 18px;
  color: #2E5C1F;
  box-shadow: inset 0 -3px 0 rgba(79,138,46,0.30), 0 3px 0 var(--leaf-deep);
}

/* ─── Speech-bubble banner ──────────────────── */
.bubble {
  position: relative;
  background: white;
  border: 3px solid var(--wood-light);
  border-radius: 22px;
  padding: 14px 18px;
  box-shadow: 0 5px 0 var(--wood-light);
}
.bubble::before {
  content: '';
  position: absolute;
  left: 28px; bottom: -14px;
  width: 18px; height: 18px;
  background: white;
  border-right: 3px solid var(--wood-light);
  border-bottom: 3px solid var(--wood-light);
  transform: rotate(45deg);
}

.banner-event {
  background: linear-gradient(180deg, #FFF8E0, #FFE9B0);
  border-color: #F2C260;
  box-shadow: 0 5px 0 #F2C260;
}
.banner-event::before { border-color: #F2C260; background: #FFE9B0; }

.banner-info-blue {
  background: linear-gradient(180deg, #ECF6FE, var(--in-bg));
  border-color: var(--in-border);
  box-shadow: 0 5px 0 var(--in-border);
}
.banner-info-blue::before { border-color: var(--in-border); background: var(--in-bg); }

.banner-econ {
  background: linear-gradient(180deg, #F3EAFB, #E2D3F2);
  border-color: #C8AEE8;
  box-shadow: 0 5px 0 #C8AEE8;
}
.banner-econ::before { border-color: #C8AEE8; background: #E2D3F2; }

/* ─── Round ribbon ─────────────────────────── */
.ribbon {
  display: inline-block;
  position: relative;
  padding: 8px 22px;
  background: linear-gradient(180deg, #FFD879, #FFB52E);
  color: white;
  font-family: 'Jua';
  font-size: 16px;
  border: 3px solid #B57D14;
  border-radius: 14px;
  box-shadow: inset 0 -4px 0 rgba(181,125,20,0.4), 0 4px 0 #B57D14;
  letter-spacing: 0.5px;
  text-shadow: 0 2px 0 rgba(0,0,0,0.15);
}

/* ─── Title pennant for start screen ───────── */
.pennant {
  display: inline-block;
  position: relative;
  padding: 14px 36px;
  background: #FF8C5A;
  color: white;
  font-family: 'Jua';
  font-size: 36px;
  letter-spacing: 1px;
  border-radius: 16px;
  border: 4px solid #B83C30;
  box-shadow: inset 0 -6px 0 rgba(184,60,48,0.4), inset 0 3px 0 rgba(255,255,255,0.3), 0 8px 0 #B83C30, 0 14px 24px rgba(184,60,48,0.22);
  text-shadow: 0 3px 0 rgba(184,60,48,0.6);
}
.pennant::before, .pennant::after {
  content: '';
  position: absolute; top: 50%;
  width: 14px; height: 14px;
  background: #FFE45E;
  border: 3px solid #B83C30;
  border-radius: 50%;
  transform: translateY(-50%);
}
.pennant::before { left: -22px; }
.pennant::after { right: -22px; }

/* ─── Group cards on start ──────────────────── */
.village-card {
  position: relative;
  border-radius: 26px;
  padding: 22px 14px 18px;
  text-align: center;
  cursor: pointer;
  border: 3.5px solid var(--vc-border);
  background: linear-gradient(180deg, var(--vc-bg-1), var(--vc-bg-2));
  box-shadow: inset 0 -6px 0 rgba(0,0,0,0.10), inset 0 3px 0 rgba(255,255,255,0.7), 0 7px 0 var(--vc-border), 0 12px 22px rgba(0,0,0,0.10);
  transition: transform 100ms;
}
.village-card:hover { transform: translateY(-3px); }
.village-card:active { transform: translateY(4px); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.10), 0 3px 0 var(--vc-border); }
.village-card.done {
  background: linear-gradient(180deg, #F4F0E5, #E0D8C5);
  border-color: #B5A988;
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.07), 0 4px 0 #B5A988;
  cursor: default;
}
.village-card .roof {
  font-size: 56px; line-height: 1;
  filter: drop-shadow(0 3px 0 rgba(0,0,0,0.12));
}
.village-card h3 {
  font-family: 'Jua';
  font-size: 22px;
  margin: 8px 0 4px;
  color: var(--vc-ink);
  text-shadow: 0 2px 0 rgba(255,255,255,0.5);
}
.village-card .stamp {
  position: absolute;
  top: -10px; right: -10px;
  background: #4F8A2E;
  color: white;
  border: 3px solid white;
  border-radius: 999px;
  padding: 4px 12px;
  font-family: 'Jua';
  font-size: 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  transform: rotate(8deg);
}
.village-card .mini {
  display: flex; justify-content: center; gap: 8px;
  margin-top: 8px;
  font-family: 'Jua';
  font-size: 14px;
  color: var(--vc-ink);
  opacity: 0.85;
}
.village-card .mini span {
  background: rgba(255,255,255,0.6);
  border-radius: 999px;
  padding: 2px 8px;
}

/* group color themes */
.vc-1 { --vc-bg-1: #FFE3B0; --vc-bg-2: #FFC97A; --vc-border: #C68A4F; --vc-ink: #6B3F18; }
.vc-2 { --vc-bg-1: #CFEAE0; --vc-bg-2: #8FD0BC; --vc-border: #3E8F76; --vc-ink: #1F4E3D; }
.vc-3 { --vc-bg-1: #DCE6F8; --vc-bg-2: #A9C0EC; --vc-border: #4F6BA8; --vc-ink: #1F2F5C; }
.vc-4 { --vc-bg-1: #F8DCEC; --vc-bg-2: #ECA9CD; --vc-border: #B85091; --vc-ink: #5C1F44; }

/* ─── Facility row ──────────────────────────── */
.fac-row {
  display: flex; align-items: center;
  background: linear-gradient(180deg, #FFFCF1, #FFF3D6);
  border: 2.5px solid #F2D9A8;
  border-radius: 16px;
  padding: 10px 12px;
  gap: 10px;
}
.fac-row .ic {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: white;
  border: 2px solid #F2D9A8;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.fac-row .nm { font-family: 'Jua'; font-size: 15px; line-height: 1.1; }
.fac-row .cost {
  display: inline-block;
  background: var(--cream-200);
  border: 1.5px solid var(--sunny-deep);
  color: var(--wood-deep);
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 999px;
  margin-top: 2px;
  font-family: 'Jua';
}
.fac-row .ctr { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.fac-row .num { font-family: 'Jua'; font-size: 20px; min-width: 24px; text-align: center; color: var(--wood-deep); }

/* ─── Big settle button ─────────────────────── */
.settle-btn {
  width: 100%;
  background: linear-gradient(180deg, #FFE25E 0%, #FFB52E 100%);
  border: 4px solid #B57D14;
  color: #5A3A22;
  font-family: 'Jua';
  font-size: 26px;
  border-radius: 22px;
  padding: 22px;
  cursor: pointer;
  letter-spacing: 1px;
  text-shadow: 0 2px 0 rgba(255,255,255,0.4);
  box-shadow: inset 0 -8px 0 rgba(181,125,20,0.4), inset 0 3px 0 rgba(255,255,255,0.5), 0 8px 0 #B57D14, 0 14px 22px rgba(181,125,20,0.25);
  transition: transform 100ms;
}
.settle-btn:hover:not(:disabled) { transform: translateY(-3px); }
.settle-btn:active:not(:disabled) { transform: translateY(5px); box-shadow: inset 0 -3px 0 rgba(181,125,20,0.4), 0 3px 0 #B57D14; }
.settle-btn:disabled {
  background: linear-gradient(180deg, #DCD0B8, #B5A988);
  border-color: #8E7350;
  box-shadow: inset 0 -6px 0 rgba(142,115,80,0.30), 0 6px 0 #8E7350;
  cursor: not-allowed;
  color: #6E5A40;
}

/* ─── Modal ────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(40,20,5,0.55);
  backdrop-filter: blur(3px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal {
  max-width: 380px; width: 100%;
  background: linear-gradient(180deg, #FFFCF1, #FFF3D6);
  border: 4px solid var(--wood-light);
  border-radius: 28px;
  padding: 28px 24px;
  text-align: center;
  box-shadow: inset 0 -6px 0 rgba(198,138,79,0.18), 0 12px 0 var(--wood-light), 0 24px 50px rgba(0,0,0,0.3);
}

/* ═══════════════════════════════════════════════
   TEACHER TV — Dark + Neon
═══════════════════════════════════════════════ */
.tv-bg {
  background:
    radial-gradient(ellipse 80% 50% at 80% 0%, rgba(92,229,229,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 0% 100%, rgba(255,111,216,0.15) 0%, transparent 60%),
    linear-gradient(160deg, var(--tv-bg-1) 0%, var(--tv-bg-2) 100%);
  min-height: 100vh;
  color: white;
  position: relative;
}
.tv-bg::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.5) 1px, transparent 1.5px);
  background-size: 24px 24px;
  opacity: 0.10;
  pointer-events: none;
}
.tv-bg > * { position: relative; }

.neon-title {
  font-family: 'Jua';
  font-size: 44px;
  letter-spacing: 2px;
  color: var(--neon-yellow);
  text-shadow: 0 0 10px rgba(255,228,94,0.6), 0 0 20px rgba(255,228,94,0.4), 0 0 38px rgba(255,228,94,0.25);
}
.neon-subtle {
  font-family: 'Jua';
  color: var(--neon-cyan);
  text-shadow: 0 0 10px rgba(92,229,229,0.5);
  letter-spacing: 1px;
}

.tv-card {
  position: relative;
  background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 26px;
  padding: 22px;
  backdrop-filter: blur(8px);
}
.tv-card.done {
  border-color: rgba(108,255,177,0.7);
  box-shadow: 0 0 22px rgba(108,255,177,0.35), inset 0 0 18px rgba(108,255,177,0.08);
}
.tv-card .group-tag {
  position: absolute; top: -14px; left: 22px;
  padding: 5px 16px;
  border-radius: 12px;
  font-family: 'Jua';
  letter-spacing: 1.5px;
  border: 2px solid white;
  box-shadow: 0 0 14px var(--gt-glow);
  background: var(--gt-bg);
  color: white;
}
.tv-1 { --gt-bg: #FF7B5A; --gt-glow: rgba(255,123,90,0.7); }
.tv-2 { --gt-bg: #5CE5B5; --gt-glow: rgba(92,229,181,0.7); }
.tv-3 { --gt-bg: #5CB6E5; --gt-glow: rgba(92,182,229,0.7); }
.tv-4 { --gt-bg: #C77DFF; --gt-glow: rgba(199,125,255,0.7); }

.tv-stat {
  background: rgba(0,0,0,0.30);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  padding: 10px 14px;
  text-align: center;
}
.tv-stat .lbl { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 1.5px; font-family: 'Jua'; }
.tv-stat .val { font-family: 'Jua'; font-size: 38px; line-height: 1; margin-top: 2px; }

.tv-resource {
  background: rgba(0,0,0,0.25);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 8px 4px;
  text-align: center;
}
.tv-resource .ic { font-size: 22px; line-height: 1; }
.tv-resource .nm { font-family: 'Jua'; font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }
.tv-resource .v  { font-family: 'Jua'; font-size: 20px; color: white; margin-top: 2px; line-height: 1; }
.tv-resource.warn { border-color: rgba(255,107,107,0.6); background: rgba(255,107,107,0.10); }
.tv-resource.warn .v { color: #FF8888; }

.tv-empty {
  border: 2px dashed rgba(255,255,255,0.18);
  border-radius: 26px;
  background: rgba(255,255,255,0.03);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  gap: 6px;
  color: rgba(255,255,255,0.4);
  font-family: 'Jua';
  letter-spacing: 1.5px;
  min-height: 240px;
}
.tv-empty .e { font-size: 50px; opacity: 0.4; }

/* ═══════════════════════════════════════════════
   PODIUM — ranking visualisation
═══════════════════════════════════════════════ */
.podium-wrap {
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.05));
  border: 2px solid rgba(255,255,255,0.12);
  padding: 22px 26px 26px;
}
.podium {
  display: grid;
  grid-template-columns: repeat(var(--cols, 4), 1fr);
  align-items: end;
  gap: 14px;
  min-height: 230px;
}
.podium .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.podium .name {
  font-family: 'Jua';
  font-size: 14px;
  color: rgba(255,255,255,0.85);
  letter-spacing: 1px;
}
.podium .medal {
  font-size: 30px;
  filter: drop-shadow(0 0 10px var(--medal-glow));
}
.podium .bar {
  width: 100%;
  border-radius: 14px 14px 0 0;
  position: relative;
  background: linear-gradient(180deg, var(--c1) 0%, var(--c2) 100%);
  border: 2px solid var(--cb);
  border-bottom: none;
  box-shadow: inset 0 4px 0 rgba(255,255,255,0.20), 0 0 22px var(--cb);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 8px;
}
.podium .bar .num {
  font-family: 'Jua';
  font-size: 26px;
  color: white;
  text-shadow: 0 2px 0 rgba(0,0,0,0.3);
}
.podium .step {
  width: 100%;
  height: 14px;
  background: repeating-linear-gradient(90deg, rgba(255,255,255,0.10) 0 8px, rgba(0,0,0,0.20) 8px 16px);
  border-radius: 0 0 6px 6px;
}
.gold   { --c1: #FFE066; --c2: #F2A926; --cb: #FFC83D; --medal-glow: rgba(255,200,61,0.7); }
.silver { --c1: #E2E8F0; --c2: #A0AEC0; --cb: #CBD5E0; --medal-glow: rgba(203,213,224,0.7); }
.bronze { --c1: #E8B98C; --c2: #B8763E; --cb: #D89B5C; --medal-glow: rgba(216,155,92,0.7); }
.fourth { --c1: #B388E0; --c2: #7E55C2; --cb: #A07ED4; --medal-glow: rgba(160,126,212,0.7); }

/* ═══════════════════════════════════════════════
   Misc
═══════════════════════════════════════════════ */
.subtle { color: var(--ink-soft); }
.tag-num {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.85);
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 11px;
  font-family: 'Jua';
  color: var(--wood-deep);
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-8px); }
  80% { transform: translateX(8px); }
}
/* small-screen tweaks */
@media (max-width: 520px) {
  .pennant { font-size: 26px; padding: 10px 24px; }
  .neon-title { font-size: 28px; }
}

/* ═══════════════════════════════════════════════
   TEACHER TV — FULLSCREEN ONE-PAGE LAYOUT
   Always fits in 100vh at 100% browser zoom (1920x1080).
   Uses cqh / cqw container queries so font sizes
   scale with the available space.
═══════════════════════════════════════════════ */
.tv-fullscreen {
  height: 100vh;
  width: 100vw;
  max-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: clamp(8px, 1.2vh, 16px) clamp(12px, 1.4vw, 22px);
  gap: clamp(8px, 1.2vh, 16px);
  overflow: hidden;
  container-type: size;
}
.tv-header {
  flex: 0 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.tv-btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  color: white;
  border: 2px solid rgba(255,255,255,0.22);
  font-family: 'Jua', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: transform 80ms;
}
.tv-btn:hover { transform: translateY(-1px); }
.tv-btn.primary {
  background: linear-gradient(180deg,#FFE45E,#FFB52E);
  color: #5A3A22;
  border-color: #B57D14;
  box-shadow: 0 0 18px rgba(255,200,61,0.5);
}
.tv-btn.ghost {
  background: white;
  color: #0E1B3D;
  border-color: white;
}
.tv-btn.danger {
  background: rgba(255,107,107,0.15);
  border-color: rgba(255,107,107,0.5);
  padding: 10px 14px;
}

.tv-grid {
  flex: 1 1 0;
  min-height: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: clamp(10px, 1.6vh, 22px) clamp(10px, 1vw, 18px);
  margin-top: clamp(4px, 0.6vh, 8px); /* group-tag 카드 내부 배치로 여백 축소 */
}

.tv-card-big {
  position: relative;
  background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
  border: 2px solid rgba(255,255,255,0.20);
  border-radius: clamp(14px, 1.6vh, 22px);
  padding: clamp(12px, 1.8vh, 22px) clamp(14px, 1.4vw, 22px);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  min-height: 0;
  min-width: 0;
  gap: clamp(8px, 1.2vh, 14px);
  overflow: visible;
}
.tv-card-big.done {
  border-color: rgba(108,255,177,0.7);
  box-shadow: 0 0 26px rgba(108,255,177,0.30), inset 0 0 22px rgba(108,255,177,0.10);
}
.tv-card-big .group-tag {
  display: inline-flex;
  align-items: center;
  align-self: flex-start;
  padding: 3px 12px;
  border-radius: 999px;
  font-family: 'Jua', sans-serif;
  font-size: clamp(11px, 1.4vh, 14px);
  letter-spacing: 1.2px;
  border: 2px solid rgba(255,255,255,0.7);
  box-shadow: 0 0 10px var(--gt-glow);
  background: var(--gt-bg);
  color: white;
  z-index: 2;
  white-space: nowrap;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: -4px;
}
.tv-card-head {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 0;
  gap: 8px;
  min-width: 0;
}
.tv-card-head h3 {
  margin: 0;
  font-family: 'Jua', sans-serif;
  font-size: clamp(16px, 2.4vh, 24px);
  color: white;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tv-card-head .trade-tag {
  font-family: 'Jua', sans-serif;
  font-size: clamp(10px, 1.3vh, 13px);
  color: var(--neon-cyan);
  background: rgba(92,229,229,0.14);
  border: 1.5px solid rgba(92,229,229,0.5);
  padding: 3px 10px;
  border-radius: 999px;
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
}

.tv-stats-row {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(8px, 1vw, 14px);
  margin: 0;
}
.tv-stat-big {
  background: rgba(0,0,0,0.32);
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: clamp(10px, 1.4vh, 16px);
  padding: clamp(6px, 1vh, 12px) clamp(8px, 1vw, 14px);
  text-align: center;
  min-width: 0;
}
.tv-stat-big .lbl {
  font-family: 'Jua', sans-serif;
  font-size: clamp(10px, 1.3vh, 13px);
  color: rgba(255,255,255,0.6);
  letter-spacing: 1.4px;
  margin-bottom: 4px;
}
.tv-stat-big .val {
  font-family: 'Jua', sans-serif;
  font-size: clamp(26px, 4.2vh, 44px);
  line-height: 1;
}

.tv-resources-big {
  flex: 1 1 0;
  min-height: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: clamp(6px, 0.8vw, 10px);
  margin: 0;
}
.tv-resource-big {
  background: rgba(0,0,0,0.30);
  border: 2px solid rgba(255,255,255,0.14);
  border-radius: clamp(8px, 1.2vh, 12px);
  padding: clamp(6px, 1vh, 10px) 4px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(2px, 0.6vh, 6px);
  min-width: 0;
  min-height: 0;
  overflow: hidden;
}
.tv-resource-big .ic {
  font-size: clamp(20px, 3.4vh, 34px);
  line-height: 1;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
}
.tv-resource-big .v {
  font-family: 'Jua', sans-serif;
  font-size: clamp(20px, 3.4vh, 34px);
  color: white;
  line-height: 1;
  text-shadow: 0 0 12px rgba(255,255,255,0.25);
}
.tv-resource-big .nm {
  font-family: 'Jua', sans-serif;
  font-size: clamp(9px, 1.2vh, 12px);
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.8px;
  margin-top: 1px;
}
.tv-resource-big.warn {
  border-color: rgba(255,107,107,0.7);
  background: rgba(255,107,107,0.12);
  box-shadow: 0 0 18px rgba(255,107,107,0.25) inset;
}
.tv-resource-big.warn .v { color: #FF8888; text-shadow: 0 0 14px rgba(255,107,107,0.6); }

.tv-empty-big {
  border: 2px dashed rgba(255,255,255,0.18);
  border-radius: clamp(14px, 1.6vh, 22px);
  background: rgba(255,255,255,0.03);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  gap: 6px;
  color: rgba(255,255,255,0.4);
  font-family: 'Jua', sans-serif;
  font-size: clamp(14px, 2vh, 20px);
  letter-spacing: 1.5px;
  flex: 1 1 0;
  min-height: 0;
}
.tv-empty-big .e { font-size: clamp(36px, 5vh, 56px); opacity: 0.5; }

/* Bottom strip — last flex item, NOT fixed */
.tv-footer {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
  gap: clamp(8px, 0.8vw, 14px);
  align-items: stretch;
}
.tv-footer-q {
  background: linear-gradient(180deg, rgba(255,228,94,0.12), rgba(255,228,94,0.04));
  border: 2px solid rgba(255,228,94,0.5);
  border-radius: clamp(10px, 1.4vh, 14px);
  padding: clamp(6px, 1vh, 10px) clamp(10px, 1vw, 16px);
  box-shadow: 0 0 24px rgba(255,228,94,0.15);
  min-width: 0;
}
.tv-footer-q .lbl {
  font-family: 'Jua', sans-serif;
  font-size: clamp(9px, 1.1vh, 11px);
  color: var(--neon-yellow);
  letter-spacing: 2px;
}
.tv-footer-q p {
  font-family: 'Jua', sans-serif;
  font-size: clamp(13px, 1.8vh, 18px);
  color: white;
  margin: 2px 0 0;
  line-height: 1.25;
  text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}
.tv-footer-e {
  background: rgba(255,167,38,0.10);
  border: 2px solid rgba(255,169,77,0.5);
  border-left-width: 5px;
  border-radius: clamp(10px, 1.4vh, 14px);
  padding: clamp(6px, 1vh, 10px) clamp(10px, 1vw, 16px);
  display: flex;
  gap: 10px;
  align-items: center;
  min-width: 0;
}
.tv-footer-e .ev-name {
  font-family: 'Jua', sans-serif;
  font-size: clamp(12px, 1.6vh, 15px);
  color: var(--neon-orange);
  text-shadow: 0 0 10px rgba(255,169,77,0.5);
}
.tv-footer-e .ev-desc {
  font-family: 'Gaegu', sans-serif;
  font-size: clamp(11px, 1.4vh, 14px);
  color: rgba(255,255,255,0.85);
  margin-top: 1px;
  line-height: 1.25;
}

/* group-tag color themes */
.tv-card-big.tv-1 { --gt-bg: #FF7B5A; --gt-glow: rgba(255,123,90,0.7); }
.tv-card-big.tv-2 { --gt-bg: #5CE5B5; --gt-glow: rgba(92,229,181,0.7); }
.tv-card-big.tv-3 { --gt-bg: #5CB6E5; --gt-glow: rgba(92,182,229,0.7); }
.tv-card-big.tv-4 { --gt-bg: #C77DFF; --gt-glow: rgba(199,125,255,0.7); }

/* Very narrow viewports (rare for classroom TV) — stack vertically */
@media (max-width: 800px) {
  .tv-grid { grid-template-columns: 1fr; grid-template-rows: repeat(4, 1fr); }
}

  

/* ═══════════════════════════════════════════════
   PERSONAL ROGUELIKE MODE — 30분 성장 챌린지
════════════════════════════════════════════════ */
.challenge-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 14px;
}
.player-slot {
  border-radius: 22px;
  padding: 16px 12px;
  border: 3px solid #F2D9A8;
  background: linear-gradient(180deg, #FFFCF1, #FFF3D6);
  box-shadow: inset 0 -4px 0 rgba(198,138,79,0.12), 0 5px 0 #F2D9A8;
  cursor: pointer;
  transition: transform 80ms ease;
  min-height: 150px;
}
.player-slot:hover { transform: translateY(-2px); }
.player-slot.joined { border-color: #7DB342; box-shadow: inset 0 -4px 0 rgba(79,138,46,0.14), 0 5px 0 #7DB342; }
.goal-card {
  border-radius: 18px;
  background: linear-gradient(180deg, #F3EAFB, #E2D3F2);
  border: 3px solid #C8AEE8;
  padding: 14px;
  box-shadow: inset 0 -4px 0 rgba(128,80,170,0.12);
}
.player-layout {
  display: grid;
  grid-template-columns: minmax(260px, 0.9fr) minmax(320px, 1.3fr) minmax(260px, 0.9fr);
  gap: 18px;
  align-items: start;
}
.action-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}
.action-card {
  border: 2.5px solid #F2D9A8;
  border-radius: 18px;
  background: white;
  padding: 12px;
  box-shadow: inset 0 -3px 0 rgba(198,138,79,0.10), 0 3px 0 #F2D9A8;
  cursor: pointer;
  text-align: left;
  color: var(--ink);
}
.action-card:hover:not(:disabled) { transform: translateY(-1px); }
.action-card:disabled { opacity: 0.45; cursor: not-allowed; }
.progress-track {
  height: 16px;
  border-radius: 999px;
  background: rgba(90,58,34,0.12);
  overflow: hidden;
  border: 2px solid rgba(90,58,34,0.10);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #7DB342, #FFC83D);
  border-radius: 999px;
  transition: width 180ms ease;
}
.timer-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 999px;
  padding: 8px 16px;
  background: linear-gradient(180deg, #0E1B3D, #1A2B5E);
  color: white;
  border: 2px solid rgba(255,255,255,0.3);
  font-family: 'Jua';
  font-size: 18px;
}
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border-radius: 999px;
  padding: 4px 9px;
  font-family: 'Jua';
  font-size: 12px;
  background: #FFF3D6;
  border: 2px solid #F2C98A;
  color: #5A3A22;
}
.status-badge.warn { background: #FBE0DC; border-color: #ED9C92; color: #A6362A; }
.status-badge.good { background: #DFF5F1; border-color: #7DD0BD; color: #1F5C4F; }
.teacher-grid-13 {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 12px;
}
.teacher-player-card {
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.16);
  border-radius: 18px;
  padding: 14px;
  color: white;
  min-height: 170px;
}
.teacher-player-card.done { border-color: rgba(108,255,177,0.70); box-shadow: 0 0 18px rgba(108,255,177,0.22); }
.teacher-mini-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 8px;
}
.teacher-mini-stat {
  background: rgba(0,0,0,0.26);

function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
function pct(n) { return Math.round(clamp(n, 0, 1.5) * 100); }
function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
function playerSnapshot(p) {
  var snap = deepClone(p);
  delete snap.monthStartSnapshot;
  return snap;
}
function ensureMonthSnapshot(p) {
  if (!p.monthStartSnapshot) p.monthStartSnapshot = playerSnapshot(p);
  return p;
}
function canUseTimeMachine(p) {
  return !!p && !p.finished && (p.timeMachinesLeft || 0) > 0 && !!p.monthStartSnapshot;
}
function fmtTime(ms) {
  var sec = Math.max(0, Math.ceil(ms / 1000));
  var m = String(Math.floor(sec / 60)).padStart(2, '0');
  var s = String(sec % 60).padStart(2, '0');
  return m + ':' + s;
}
function nowMs() { return Date.now(); }

function assignRandomGoal() {

function emptyFacilities() {

function initPlayers() {

function initApp() {

}
function migrateGameState(raw) {
  if (!raw || raw.mode !== 'personal_roguelike' || !raw.players) return initApp();
  var base = initApp();
  var merged = Object.assign({}, base, raw);
  merged.players = Object.assign({}, base.players, raw.players || {});
  for (var i = 1; i <= PLAYER_COUNT; i++) {
    var id = String(i);
    merged.players[id] = Object.assign({}, initPlayer(i), merged.players[id] || {});
    merged.players[id].resources = Object.assign({}, emptyResources(), merged.players[id].resources || {});
    merged.players[id].facilities = Object.assign({}, emptyFacilities(), merged.players[id].facilities || {});
    merged.players[id].facilityLevels = Object.assign({}, merged.players[id].facilityLevels || {});
    merged.players[id].stats = Object.assign({}, initPlayer(i).stats, merged.players[id].stats || {});
  }
  return merged;
}

function useFirebase() {
  var tuple = useState({ db: null, fbReady: false, fbError: null });
  var state = tuple[0], setState = tuple[1];
  useEffect(function(){
    try {
      if (typeof firebase === 'undefined') throw new Error('Firebase SDK가 로드되지 않았습니다. 인터넷 연결 또는 script 태그를 확인하세요.');
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      var db = firebase.database();
      setState({ db: db, fbReady: true, fbError: null });
    } catch (err) {
      setState({ db: null, fbReady: false, fbError: err.message || String(err) });
    }
  }, []);
  return state;
}

function useGameState(db, fbReady) {
  var tuple = useState(initApp());
  var gameState = tuple[0], setGameState = tuple[1];
  var syncTuple = useState(false);
  var synced = syncTuple[0], setSynced = syncTuple[1];

  useEffect(function(){
    if (!db || !fbReady) return;
    var ref = db.ref(DB_PATH);
    var handler = function(snapshot) {
      var data = snapshot.val();
      var migrated = migrateGameState(data);
      setGameState(migrated);
      setSynced(true);
      if (!data || data.mode !== 'personal_roguelike') ref.set(migrated);
    };
    ref.on('value', handler, function(err){ console.error(err); });
    return function(){ ref.off('value', handler); };
  }, [db, fbReady]);

  function saveState(next) {
    next = migrateGameState(Object.assign({}, next, { updatedAt: nowMs() }));
    setGameState(next);
    if (db && fbReady) db.ref(DB_PATH).set(next);
  }
  function resetState() {
    saveState(initApp());
  }
  return { gameState: gameState, saveState: saveState, resetState: resetState, synced: synced };
}

function getRemainingMs(gameState, tick) {
  if (!gameState.startedAt) return PLAY_SECONDS * 1000;
  var elapsed = (tick || nowMs()) - gameState.startedAt;
  return Math.max(0, PLAY_SECONDS * 1000 - elapsed);
}
function isTimeUp(gameState, tick) { return gameState.startedAt && getRemainingMs(gameState, tick) <= 0; }
function useNow(interval) {
  var tuple = useState(nowMs());
  var now = tuple[0], setNow = tuple[1];
  useEffect(function(){ var t = setInterval(function(){ setNow(nowMs()); }, interval || 1000); return function(){ clearInterval(t); }; }, [interval]);
  return now;
}

function countFacilities(p) { return Object.values(p.facilities || {}).reduce(function(a,b){ return a + (b || 0); }, 0); }
function calculateFoodConsumption(p) {
  var base = p.month <= 3 ? 2 : (p.month <= 6 ? 3 : 4);
  var fac = countFacilities(p);
  var extra = 0;
  if (fac >= 4) extra += 1;
  if (fac >= 7) extra += 1;
  if (fac >= 10) extra += 1;
  return base + extra;
}
function getMarketDiscount(p) {
  var level = p.facilityLevels.market || 1;
  if ((p.facilities.market || 0) <= 0) return 0;
  return level >= 2 ? 2 : 1;
}
function getMarketFee(p) { return p.tempMarketFee || 0; }
function getUpgradeCost(p, fid) {
  var cnt = (p.facilities && p.facilities[fid]) || 0;
  var base = FACILITIES[fid] ? FACILITIES[fid].upgradeCost : 0;
  return base * Math.max(1, cnt);
}
function calculateIndustrialStress(p) {
  var stress = 0;
  var factories = p.facilities.factory || 0;
  var powers = p.facilities.power || 0;
  stress += factories;
  stress += powers;
  if (factories >= 3) stress += 3;
  if (powers >= 2) stress += 2;
  return stress;
}
function applyShield(p, penalty) {
  var shield = p.stats.shield || 0;
  if (shield <= 0) return penalty;
  var reduced = Math.max(0, penalty - 4);
  p.stats.shield = Math.max(0, shield - 1);
  return reduced;
}

function drawRandomEvent(p) {
  var month = p.month || 1;
  var available = EVENT_DECK.filter(function(ev){
    if (month <= 2) return ev.tier === 'mild';
    if (month >= 7) return ev.tier !== 'mild' || ev.id === 'small_support';
    return ev.tier === 'normal' || ev.tier === 'mild';
  });
  var lastId = p.recentEvent && p.recentEvent.id;
  var lastWasCrisis = p.recentEvent && p.recentEvent.crisis;
  available = available.filter(function(ev){
    if (ev.id === lastId) return false;
    if (lastWasCrisis && ev.crisis && ev.tier === 'hard') return false;
    return true;
  });
  return deepClone(randItem(available.length ? available : EVENT_DECK));
}

function addProduction(p, key, amount) {
  p.resources[key] = Math.max(0, (p.resources[key] || 0) + amount);
}
function produceResources(p, ctx) {
  Object.keys(FACILITIES).forEach(function(fid){
    if (fid === 'factory') return;
    var cnt = p.facilities[fid] || 0;
    if (!cnt) return;
    var level = p.facilityLevels[fid] || 1;
    var prod = level >= 2 ? (FACILITIES[fid].prod2 || FACILITIES[fid].prod) : FACILITIES[fid].prod;
    Object.keys(prod || {}).forEach(function(rid){
      var amount = prod[rid] * cnt;
      if (rid === 'rice') amount = Math.floor(amount * (ctx.riceMultiplier || 1));
      addProduction(p, rid, amount);
      if (amount) ctx.notes.push(FACILITIES[fid].name + ' 생산: ' + RESOURCES[rid].name + ' +' + amount);
    });
  });

  var factories = p.facilities.factory || 0;
  if (factories > 0) {
    var level = p.facilityLevels.factory || 1;
    var productPerFactory = level >= 2 ? 4 : 2;
    var need = factories;
    var powered = Math.min(need, p.resources.electricity || 0);
    p.resources.electricity = Math.max(0, (p.resources.electricity || 0) - powered);
    if (powered > 0) {
      var product = powered * productPerFactory;
      p.resources.product += product;
      p.stats.totalProductProduced = (p.stats.totalProductProduced || 0) + product;
      ctx.notes.push('공장 가동: 제품 +' + product + ', 전기 -' + powered);
    }
    if (powered < need) {
      var lack = need - powered;
      ctx.happinessDelta -= 4 * lack;
      p.stats.electricityShortageCount += 1;
      ctx.notes.push('전기 부족: 행복 -' + (4 * lack));
    }
  }
}

function processMonth(original) {
  var p = deepClone(original);
  if (p.finished) return p;
  var maxMonth = p.bonusMode ? BONUS_MAX_MONTH : MAX_MONTH;
  var ctx = { riceMultiplier: 1, happinessDelta: -2, eventDamage: false, notes: ['기본 생활 불만: 행복 -2'] };
  var foodStable = true;
  p.tempMarketFee = 0;

  var baseIncome = 1;
  var marketIncome = (p.facilities.market || 0) > 0 ? 1 : 0;
  p.coins += baseIncome + marketIncome;
  ctx.notes.push('기본 세금 +' + baseIncome + '코인' + (marketIncome ? ', 시장 수익 +' + marketIncome + '코인' : ''));

  var event = drawRandomEvent(p);
  var originalEvent = EVENT_DECK.find(function(ev){ return ev.id === event.id; });
  if (originalEvent && originalEvent.apply) originalEvent.apply(p, ctx);

  produceResources(p, ctx);

  var foodNeed = calculateFoodConsumption(p);
  if ((p.resources.rice || 0) >= foodNeed) {
    p.resources.rice -= foodNeed;
    ctx.notes.push('쌀 소비 -' + foodNeed + ' / 부족 없음');
  } else {
    var shortage = foodNeed - (p.resources.rice || 0);
    p.resources.rice = 0;
    p.stats.riceShortageCount += 1;
    foodStable = false;
    var penalty = shortage === 1 ? 5 : 12;
    if (shortage >= 3) penalty = 15;
    ctx.happinessDelta -= penalty;
    ctx.eventDamage = true;
    ctx.notes.push('쌀 부족 ' + shortage + '개: 행복 -' + penalty);
  }

  var stress = calculateIndustrialStress(p);
  if (stress > 0) {
    ctx.happinessDelta -= stress;
    ctx.notes.push('산업 시설 부담: 행복 -' + stress);
  }

  if (ctx.eventDamage) p.stats.eventDamageCount += 1;
  p.happiness = clamp((p.happiness || 0) + ctx.happinessDelta, 0, 100);
  if (foodStable) p.stats.stableFoodMonths = (p.stats.stableFoodMonths || 0) + 1;
  if (p.happiness >= 85) p.stats.highHappinessMonths = (p.stats.highHappinessMonths || 0) + 1;

  if (p.happiness >= 10 && p.happiness <= 29) {
    p.coins = Math.max(0, p.coins - 2);
    ctx.notes.push('행복 위기: 코인 -2');
  }

  p.stats.totalMonthsProcessed += 1;
  p.recentEvent = {
    id: event.id,
    icon: originalEvent ? originalEvent.icon : event.icon,
    name: originalEvent ? originalEvent.name : event.name,
    desc: originalEvent ? originalEvent.desc : event.desc,
    crisis: !!(originalEvent && originalEvent.crisis),
    notes: ctx.notes,
    month: p.month
  };
  p.eventHistory = (p.eventHistory || []).concat([p.recentEvent]).slice(-6);
  p.log = (p.log || []).concat([p.month + '개월차: ' + p.recentEvent.name + ' · ' + ctx.notes.join(' / ')]).slice(-8);
  p.monthStartSnapshot = null;

  if (p.month >= maxMonth) {
    p.finished = true;
    p.finishedAt = nowMs();
    p.actionsLeft = 0;
  } else {
    p.month += 1;
    p.actionsLeft = p.happiness <= 9 ? Math.max(1, ACTIONS_PER_MONTH - 1) : ACTIONS_PER_MONTH;
  }
  p.goalProgress = calculateGoalProgress(p);
  return p;
}

function goalPart(current, target) {
  return clamp((current || 0) / target, 0, 1);
}
function goalPenaltyPart(count, allowed) {
  count = count || 0;
  if (count <= allowed) return 1;
  return Math.max(0, 1 - (count - allowed) * 0.5);
}
function averageGoal(parts) {
  var sum = parts.reduce(function(a,b){ return a + clamp(b, 0, 1); }, 0);
  return Math.round((sum / parts.length) * 100);
}
function calculateGoalProgress(p) {
  var r = p.resources || emptyResources();
  var st = p.stats || {};
  var g = p.goalId;
  if (!g) return 0;

  // v13 구조적 밸런스: 월수 상한 꼼수 없이, 누적 안정/누적 행복/복합 조건으로 초반 달성을 막습니다.
  if (g === 'happy') return averageGoal([
    goalPart(p.happiness, 95),
    goalPart(st.highHappinessMonths || 0, 8)
  ]);
  if (g === 'rich') return averageGoal([
    goalPart(p.coins, 100),
    goalPart(p.happiness, 45),
    goalPenaltyPart(st.riceShortageCount || 0, 0)
  ]);
  if (g === 'industry') return averageGoal([
    goalPart(st.totalProductProduced || 0, 70),
    goalPart(p.coins, 60),
    goalPart(p.happiness, 35)
  ]);
  if (g === 'self') return averageGoal([
    goalPart(r.rice, 120),
    goalPart(st.stableFoodMonths || 0, 8),
    goalPart(p.happiness, 60),
    goalPenaltyPart(st.riceShortageCount || 0, 0)
  ]);
  if (g === 'balanced') return averageGoal([
    goalPart(p.happiness, 80),
    goalPart(p.coins, 45),
    goalPart(Math.min(r.rice || 0, r.electricity || 0, r.medical || 0, r.culture || 0, r.product || 0), 5)
  ]);
  if (g === 'safe') return averageGoal([
    goalPart(r.medical, 22),
    goalPart(p.happiness, 85),
    goalPart(st.stableFoodMonths || 0, 8),
    goalPenaltyPart(st.eventDamageCount || 0, 1)
  ]);
  return 0;
}
function getGrade(progress) {
  if (progress >= 100) return 'S';
  if (progress >= 80) return 'A';
  if (progress >= 60) return 'B';
  if (progress >= 40) return 'C';
  return 'D';
}
function getStatusBadges(p) {
  var badges = [];
  if (!p.joined) return badges;
  var foodNeed = calculateFoodConsumption(p);
  if ((p.resources.rice || 0) < foodNeed) badges.push({ text: '🚨 식량 위기', type: 'warn' });
  if ((p.happiness || 0) <= 30) badges.push({ text: '😢 행복 위기', type: 'warn' });
  if ((p.coins || 0) <= 0) badges.push({ text: '💸 재정 위기', type: 'warn' });
  if ((p.facilities.factory || 0) > 0 && (p.resources.electricity || 0) <= 0) badges.push({ text: '⚡ 전력 부족', type: 'warn' });
  if ((p.goalProgress || 0) >= 100) badges.push({ text: '🏆 목표 달성', type: 'good' });
  else if ((p.goalProgress || 0) >= 80) badges.push({ text: '⭐ 목표 임박', type: 'good' });
  if (badges.length === 0) badges.push({ text: '🙂 안정', type: 'good' });
  return badges;
}
function resultComment(p) {
  if ((p.goalProgress || 0) >= 100) return '목표를 완전히 달성한 훌륭한 마을입니다!';
  if (p.coins >= 45 && p.happiness < 45) return '경제 성장은 빠르지만 주민 불만 관리가 필요합니다.';
  if ((p.resources.rice || 0) >= 20 && p.coins < 15) return '식량은 안정적이지만 성장 투자 여력이 부족합니다.';
  if (p.happiness >= 80 && p.coins < 15) return '주민 만족도는 높지만 재정 기반이 약합니다.';
  if (p.stats.eventDamageCount <= 1 && p.month >= 8) return '위기에 강한 안정적인 마을입니다.';
  return '목표에 맞게 조금 더 균형 있는 선택을 하면 좋아집니다.';
}

  var p = props.gameState.players[String(props.activePlayer)] || initPlayer(props.activePlayer);
  useEffect(function(){
    if (p.joined && !p.rulesSeen && !ruleDismissed) setRuleBookOpen(true);
  }, [p.id, p.joined, p.rulesSeen, ruleDismissed]);

  }

    setRuleDismissed(true);
    setRuleBookOpen(false);
    if (p.joined && !p.rulesSeen) {
      savePlayer(function(x){ x.rulesSeen = true; return x; });
    }
  }
  function canAct() { return !disabled && p.actionsLeft > 0; }
  function buildFacility(fid) {
    if (!canAct()) return;
    var fac = FACILITIES[fid];
    if (p.coins < fac.cost) return alert('코인이 부족합니다.');
    savePlayer(function(x){
      x = ensureMonthSnapshot(x);
      x.coins -= fac.cost;
      x.facilities[fid] = (x.facilities[fid] || 0) + 1;
      if (!x.facilityLevels[fid]) x.facilityLevels[fid] = 1;
      x.actionsLeft -= 1;

      return x;

    if ((p.facilityLevels[fid] || 1) >= 2) return alert('이미 2단계입니다.');

    savePlayer(function(x){
      x = ensureMonthSnapshot(x);
      x.coins -= cost;
      x.facilityLevels[fid] = 2;
      x.actionsLeft -= 1;
      x.log = (x.log || []).concat(['전체 강화: ' + fac.name + ' Lv.2 -' + cost + '코인']).slice(-8);
      return x;
    });

    var discount = getMarketDiscount(p);

    var map = {
      buy_rice: { cost: 3, rid:'rice', amount:4, label:'쌀 구매' },
      buy_electricity: { cost: 3, rid:'electricity', amount:3, label:'전기 구매' },

    if (action === 'sell_product' || action === 'sell_electricity' || action === 'sell_rice') {
      var sellMap = {
        sell_product: { rid:'product', need:1, coin:3, label:'제품 판매', stat:'totalProductSold' },
        sell_electricity: { rid:'electricity', need:3, coin:2, label:'전기 판매', stat:'totalElectricitySold' },

      savePlayer(function(x){
        x = ensureMonthSnapshot(x);
        var bonus = 0;
        x.resources[s.rid] -= s.need;

        x.actionsLeft -= 1;
        x.log = (x.log || []).concat(['시장: ' + s.label + ' +' + s.coin + '코인']).slice(-8);
        return x;
      });
      return;
    }
    var m = map[action];
    var cost = Math.max(1, m.cost - discount + fee);
    if (p.coins < cost) return alert('코인이 부족합니다.');
    savePlayer(function(x){
      x = ensureMonthSnapshot(x);

  }
  function useResource(action) {

      )
    ),
    h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))', gap:12, marginBottom:14 } },
      h(TeacherTopStat, { label:'남은 시간', value:props.gameState.startedAt ? fmtTime(getRemainingMs(props.gameState, now)) : '대기중' }),
      h(TeacherTopStat, { label:'참가자', value:joined.length + '/' + PLAYER_COUNT }),
      h(TeacherTopStat, { label:'평균 달성률', value:avgProgress + '%' }),
      h(TeacherTopStat, { label:'평균 행복도', value:avgHappy }),
      h(TeacherTopStat, { label:'완료/달성', value:doneCount + '명' })
    ),
    h('div', { className:'podium-wrap', style:{ marginBottom:14 } },
      h('div', { className:'neon-subtle', style:{ marginBottom:8 } }, '🏆 목표 달성률 TOP 3'),
      rankings.length ? h('div', { style:{ display:'flex', gap:10, flexWrap:'wrap' } }, rankings.map(function(p,i){
        return h('div', { key:p.id, className:'tv-stat', style:{ minWidth:150, flex:'1 1 150px' } },
          h('div', { className:'lbl' }, (i+1) + '위 · ' + (PLAYER_GOALS[p.goalId] ? PLAYER_GOALS[p.goalId].title : '목표 없음')),
          h('div', { className:'val' }, (p.goalProgress || 0) + '%'),
          h('div', { style:{ fontFamily:'Jua', marginTop:5 } }, p.name)
        );
      })) : h('div', { style:{ color:'rgba(255,255,255,0.55)', fontFamily:'Jua' } }, '아직 참가자가 없습니다.')
    ),
    h('div', { className:'teacher-grid-13' }, list.map(function(p){ return h(TeacherPlayerCard, { key:p.id, player:p }); }))
  );
}
function TeacherTopStat(props) {
  return h('div', { className:'tv-stat' }, h('div', { className:'lbl' }, props.label), h('div', { className:'val' }, props.value));
}
function TeacherPlayerCard(props) {
  var p = props.player;
  var goal = PLAYER_GOALS[p.goalId];
  if (!p.joined) {
    return h('div', { className:'teacher-player-card' },
      h('div', { style:{ fontFamily:'Jua', fontSize:20 } }, p.id + '번'),
      h('div', { style:{ marginTop:34, textAlign:'center', opacity:0.45, fontFamily:'Jua' } }, h('div', { style:{ fontSize:44 } }, '🏡'), '입장 전')
    );
  }
  return h('div', { className:'teacher-player-card ' + (p.finished || (p.goalProgress||0)>=100 ? 'done' : '') },
    h('div', { style:{ display:'flex', justifyContent:'space-between', gap:8, alignItems:'start' } },
      h('div', { style:{ minWidth:0 } },
        h('div', { style:{ fontFamily:'Jua', fontSize:20, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } }, p.id + '번 · ' + p.name),
        h('div', { style:{ fontFamily:'Jua', color:'var(--neon-cyan)', fontSize:13, marginTop:3 } }, goal ? goal.icon + ' ' + goal.title : '목표 없음')
      ),
      h('span', { className:'status-badge ' + ((p.goalProgress||0)>=100 ? 'good' : '') }, p.month + '개월')
    ),
    h('div', { style:{ marginTop:10 } }, h(ProgressBar, { value:p.goalProgress || 0, label:'달성률' })),
    h('div', { className:'teacher-mini-row' },
      h('div', { className:'teacher-mini-stat' }, h('div', { className:'lbl' }, '행복'), h('div', { className:'val' }, p.happiness)),
      h('div', { className:'teacher-mini-stat' }, h('div', { className:'lbl' }, '코인'), h('div', { className:'val' }, p.coins)),
      h('div', { className:'teacher-mini-stat' }, h('div', { className:'lbl' }, '행동'), h('div', { className:'val' }, p.actionsLeft))
    ),
    h('div', { style:{ marginTop:9 } }, h(BadgeList, { badges:getStatusBadges(p).slice(0,2) })),
    h('div', { style:{ marginTop:9, fontFamily:'Gaegu', fontSize:14, color:'rgba(255,255,255,0.78)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } },
      p.recentEvent ? '최근: ' + p.recentEvent.icon + ' ' + p.recentEvent.name : '최근 이벤트 없음')
  );
}

function ErrorScreen(props) {
  return h('div', { style:{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#FFF8E7', padding:24 } },
    h('div', { style:{ maxWidth:560, textAlign:'center', background:'white', borderRadius:24, padding:36, border:'3px solid #F2C98A', boxShadow:'0 8px 0 #F2C98A' } },
      h('div', { style:{ fontSize:64, marginBottom:12 } }, '🔥'),
      h('h2', { style:{ fontFamily:'Jua', color:'#B83C30', margin:'0 0 12px' } }, 'Firebase 연결 오류'),
      h('p', { style:{ fontFamily:'Gaegu', fontSize:18, color:'#5A3A22', lineHeight:1.6, margin:'0 0 18px' } }, props.message),
      h('p', { style:{ fontFamily:'Gaegu', fontSize:16, color:'#8A6B4F' } }, '인터넷 연결, Firebase 프로젝트, Realtime Database 보안 규칙을 확인하세요.')
    )
  );
}

function App() {
  var fb = useFirebase();
  var gs = useGameState(fb.db, fb.fbReady);
  var modeTuple = useState('start');
  var mode = modeTuple[0], setMode = modeTuple[1];
  var playerTuple = useState(null);
  var activePlayer = playerTuple[0], setActivePlayer = playerTuple[1];
  var soloTuple = useState(null);
  var soloState = soloTuple[0], setSoloState = soloTuple[1];
  var pwOpenTuple = useState(false);
  var showPwModal = pwOpenTuple[0], setShowPwModal = pwOpenTuple[1];
  var pwTuple = useState('');
  var pwValue = pwTuple[0], setPwValue = pwTuple[1];
  var errTuple = useState(false);
  var pwError = errTuple[0], setPwError = errTuple[1];
  var shakeTuple = useState(false);
  var pwShake = shakeTuple[0], setPwShake = shakeTuple[1];

  function openTeacher(){ setPwValue(''); setPwError(false); setPwShake(false); setShowPwModal(true); }
  function submitPw(){
    if (pwValue === TEACHER_PASSWORD) { setShowPwModal(false); setMode('teacher'); }
    else { setPwError(true); setPwShake(true); setPwValue(''); setTimeout(function(){ setPwShake(false); setPwError(false); }, 700); }
  }
  function makeSoloState() {
    var s = initApp();
    s.version = 'roguelike_v15_readable_rulebook_solo';
    s.soloMode = true;
    s.startedAt = null;
    s.running = false;
    return s;
  }
  function startSolo() {
    setSoloState(makeSoloState());
    setActivePlayer('1');
    setMode('solo');
  }
  function saveSoloState(next) {
    next = migrateGameState(Object.assign({}, next, { updatedAt: nowMs(), soloMode: true, version: 'roguelike_v15_readable_rulebook' }));
    setSoloState(next);
  }

  if (fb.fbError && mode !== 'start' && mode !== 'solo') return h(ErrorScreen, { message: fb.fbError });
  if (!fb.fbError && !gs.synced && mode !== 'solo') {
    return h('div', { className:'sky-bg', style:{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' } },
      h('div', { className:'plate', style:{ padding:32, textAlign:'center' } }, h('div', { style:{ fontSize:60 } }, '⏳'), h('h2', null, '데이터 불러오는 중...'))
    );
  }

  return h(React.Fragment, null,
    mode === 'start' ? h(StartScreen, { setMode:setMode, openTeacher:openTeacher, startSolo:startSolo, firebaseError:fb.fbError }) : null,
    mode === 'select' ? h(StudentSelect, { gameState:gs.gameState, setMode:setMode, setActivePlayer:setActivePlayer }) : null,
    mode === 'player' ? h(PlayerView, { gameState:gs.gameState, saveState:gs.saveState, setMode:setMode, activePlayer:activePlayer || '1', soloMode:false }) : null,
    mode === 'solo' ? h(PlayerView, { gameState:soloState || makeSoloState(), saveState:saveSoloState, setMode:setMode, activePlayer:'1', soloMode:true }) : null,
    mode === 'teacher' ? h(TeacherDashboard, { gameState:gs.gameState, saveState:gs.saveState, resetState:gs.resetState, setMode:setMode }) : null,
    h(PasswordModal, { open:showPwModal, value:pwValue, setValue:setPwValue, submit:submitPw, close:function(){ setShowPwModal(false); }, error:pwError, shake:pwShake })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));

</script>
</body>
</html>
